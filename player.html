<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

<style>
body { margin:0; background:#000; }
video { width:100%; height:100vh; }
</style>
</head>

<body>

<video id="video" controls autoplay></video>

<script>
const API = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

const params = new URLSearchParams(window.location.search);
const matchId = params.get("id");

let player;

// ✅ FETCH STREAM USING REAL match_id
async function getStream() {
  const res = await fetch(API);
  const data = await res.json();

  const match = data.matches.find(m => m.match_id == matchId);

  if (!match) {
    alert("Match not found");
    return null;
  }

  return match.stream;
}

// ✅ INIT PLAYER
async function init() {
  const streamUrl = await getStream();

  if (!streamUrl) return;

  const video = document.getElementById("video");

  player = new shaka.Player(video);

  try {
    await player.load(streamUrl);
    video.play();
  } catch (e) {
    console.error(e);
    video.src = streamUrl;
    video.play();
  }
}

init();
</script>

</body>
</html>
