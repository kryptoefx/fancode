<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.compiled.js"></script>

<style>
body { margin:0; background:black; }
video { width:100%; height:100vh; }
</style>
</head>

<body>

<video id="video" controls autoplay></video>

<script>
const jsonURL = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function start() {
  const res = await fetch(jsonURL);
  const data = await res.json();

  const match = data.matches[id];
  const video = document.getElementById("video");

  const player = new shaka.Player(video);

  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers['Referer'] = 'https://fancode.com/';
  });

  try {
    await player.load(match.stream);
    video.play();
  } catch (e) {
    video.src = match.stream;
    video.play();
  }
}

start();
</script>

</body>
</html>
