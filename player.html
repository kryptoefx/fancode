<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

<style>
body { margin:0; background:#000; }
video { width:100%; height:100vh; }
</style>
</head>

<body>

<video id="video" controls autoplay></video>

<script>
const API = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

const params = new URLSearchParams(window.location.search);
const matchId = params.get("id");

let streamUrl = "";
const knownQuals = [];
const video = document.getElementById('video');
let player, selectedHeight = null;

// 🔥 GET STREAM USING REAL match_id
async function getStream() {
  const res = await fetch(API);
  const data = await res.json();

  const match = data.matches.find(m => m.match_id == matchId);

  if (!match) {
    alert("Match not found");
    return;
  }

  streamUrl = match.stream;
}

// ── TG popup (UNCHANGED) ─────────────────────────────────
(function(){
  const overlay  = document.getElementById('tg-overlay');
  const closeBtn = document.getElementById('tg-close');
  const laterBtn = document.getElementById('tg-later');
  const dismiss  = () => { overlay.classList.add('hidden'); sessionStorage.setItem('tg','1'); };
  if (sessionStorage.getItem('tg')) overlay.classList.add('hidden');
  closeBtn.addEventListener('click', dismiss);
  laterBtn.addEventListener('click', dismiss);
  overlay.addEventListener('click', e => { if(e.target===overlay) dismiss(); });
})();

// ── Custom quality UI (UNCHANGED) ─────────────────────────
class QualityButton extends shaka.ui.Element {
  constructor(parent, controls) {
    super(parent, controls);
    this.btn = document.createElement('button');
    this.btn.className = 'custom-quality-btn';
    this.btn.innerHTML = '&#9881; <span id="ql">Auto</span>';
    this.menu = document.createElement('div');
    this.menu.className = 'custom-quality-menu';
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;display:flex;align-items:center;';
    wrap.appendChild(this.menu);
    wrap.appendChild(this.btn);
    parent.appendChild(wrap);
    this.btn.addEventListener('click', e => { e.stopPropagation(); this.menu.classList.toggle('open'); });
    document.addEventListener('click', () => this.menu.classList.remove('open'));
  }
}
QualityButton.Factory = class {
  create(rootElement, controls) { return new QualityButton(rootElement, controls); }
};
shaka.ui.Controls.registerElement('custom_quality', new QualityButton.Factory());

function buildQualityMenu(menuEl, tracks) {
  menuEl.innerHTML = '';
  const autoDiv = document.createElement('div');
  autoDiv.textContent = 'Auto';
  autoDiv.className = 'selected';
  autoDiv.onclick = () => {
    selectedHeight = null;
    player.configure({ abr:{ enabled:true } });
    menuEl.classList.remove('open');
  };
  menuEl.appendChild(autoDiv);

  const seen = new Set();
  tracks.sort((a,b)=>b.height-a.height).forEach(t => {
    if (seen.has(t.height)) return;
    seen.add(t.height);
    const d = document.createElement('div');
    d.textContent = t.height+'p';
    d.onclick = () => {
      selectedHeight = t.height;
      player.configure({ abr:{ enabled:false } });
      const match = player.getVariantTracks().find(v=>v.height===t.height);
      if (match) player.selectVariantTrack(match, true);
      menuEl.classList.remove('open');
    };
    menuEl.appendChild(d);
  });
}

// ── PLAYER INIT ───────────────────────────────────────────
async function initializePlayer() {
  try {
    player = new shaka.Player();
    await player.attach(video);

    const container = document.querySelector('.shaka-video-container');
    const ui = new shaka.ui.Overlay(player, container, video);

    ui.configure({
      controlPanelElements:[
        'play_pause','mute','time_and_duration','spacer',
        'custom_quality','fullscreen'
      ]
    });

    // headers (important for streams)
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
      request.headers['Referer'] = 'https://fancode.com/';
    });

    await player.load(streamUrl);

  } catch(err) {
    console.log("Fallback video");
    video.src = streamUrl;
    video.play();
  }
}

// 🚀 START FLOW (FIXED)
document.addEventListener('DOMContentLoaded', async () => {
  await getStream();      // 🔥 get correct stream
  initializePlayer();     // 🔥 start player
});
</script>

</body>
</html>
