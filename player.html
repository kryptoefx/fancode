<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Player</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { background:#000; width:100%; height:100%; font-family:system-ui,sans-serif; }
    body { position:absolute; color:#fff; display:flex; justify-content:center; align-items:flex-start; }
    .video-container { position:absolute; width:100%; height:100%; aspect-ratio:16/9; background:#000; overflow:hidden; }
    .shaka-video-container { position:absolute; width:100%; height:100%; }
    video { width:100%; height:100%; background:#000; }
  </style>
</head>

<body>
<div class="video-container">
  <div class="shaka-video-container" data-shaka-player>
    <video id="video" autoplay playsinline></video>
  </div>
</div>

<script>
const jsonURL = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

const urlParams = new URLSearchParams(window.location.search);
const matchId = urlParams.get("id");

let player;
let streamUrl = "";

// 🔥 GET STREAM FROM JSON
async function getStream() {
  const res = await fetch(jsonURL);
  const data = await res.json();

  const match = data.matches.find(m => m.id == matchId);

  if (!match) {
    alert("Match not found");
    return;
  }

  streamUrl = match.stream;
}

// 🔥 INIT PLAYER
async function initPlayer() {
  const video = document.getElementById('video');

  player = new shaka.Player(video);

  const container = document.querySelector('.shaka-video-container');
  const ui = new shaka.ui.Overlay(player, container, video);

  ui.configure({
    controlPanelElements: [
      'play_pause','mute','time_and_duration',
      'spacer','fullscreen','overflow_menu'
    ]
  });

  // Headers (important for streams like FanCode)
  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers['Referer'] = 'https://fancode.com/';
    request.headers['User-Agent'] = 'Mozilla/5.0';
  });

  try {
    await player.load(streamUrl);
    video.play();
  } catch (e) {
    console.error("Error loading stream:", e);
    video.src = streamUrl;
    video.play();
  }
}

// 🚀 START
document.addEventListener('DOMContentLoaded', async () => {
  await getStream();
  await initPlayer();
});
</script>

</body>
</html>
