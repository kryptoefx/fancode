<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Player</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{background:#000;width:100%;height:100%;font-family:sans-serif;}
    .video-container{width:100%;height:100%;}
    video{width:100%;height:100%;background:#000;}

    #tg-badge{
      position:absolute;top:12px;right:12px;z-index:800;
      background:#229ED9;color:#fff;padding:6px 10px;
      border-radius:6px;text-decoration:none;font-size:13px;
    }

    #tg-overlay{
      position:absolute;inset:0;background:rgba(0,0,0,0.7);
      display:flex;justify-content:center;align-items:center;
    }
    #tg-overlay.hidden{display:none;}
    #tg-popup{
      background:#229ED9;color:#fff;padding:25px;border-radius:10px;
      text-align:center;width:300px;
    }
    #tg-close{position:absolute;top:10px;right:10px;cursor:pointer;}
  </style>
</head>

<body>

<div class="video-container">
  <div class="shaka-video-container" data-shaka-player>
    <video id="video" autoplay playsinline></video>
  </div>

  <a id="tg-badge" href="https://t.me/+qUHOnerArQMyYWE9" target="_blank">
    Join Telegram
  </a>

  <div id="tg-overlay">
    <div id="tg-popup">
      <div id="tg-close">✕</div>
      <h3>Join Telegram</h3>
      <p>Get live streams instantly</p>
      <a href="https://t.me/+qUHOnerArQMyYWE9" target="_blank">JOIN</a>
    </div>
  </div>
</div>

<script>
const API = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

const params = new URLSearchParams(window.location.search);
const matchId = params.get("id");

const video = document.getElementById("video");
let player;
let streamUrl = "";

// ✅ GET STREAM FROM REAL match_id
async function getStream() {
  const res = await fetch(API);
  const data = await res.json();

  const match = data.matches.find(m => m.match_id == matchId);

  if (!match) {
    alert("Match not found");
    return;
  }

  streamUrl = match.stream;
}

// ✅ INIT PLAYER
async function initPlayer() {
  try {
    player = new shaka.Player(video);

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
      request.headers['Referer'] = 'https://fancode.com/';
    });

    await player.load(streamUrl);
    video.play();

  } catch (e) {
    console.log("Fallback");
    video.src = streamUrl;
    video.play();
  }
}

// TG popup
(function(){
  const overlay = document.getElementById('tg-overlay');
  const close = document.getElementById('tg-close');

  close.onclick = () => overlay.classList.add("hidden");
  overlay.onclick = (e) => {
    if(e.target === overlay) overlay.classList.add("hidden");
  };
})();

// 🚀 START
document.addEventListener("DOMContentLoaded", async () => {
  await getStream();
  initPlayer();
});
</script>

</body>
</html>
