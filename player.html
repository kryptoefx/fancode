<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Player</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.compiled.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
    }

    video {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

<video id="video" controls autoplay></video>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

const jsonURL = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

fetch(jsonURL)
.then(res => res.json())
.then(data => {

  const match = data.matches.find(m => m.id == id);

  const video = document.getElementById('video');
  const player = new shaka.Player(video);

  player.load(match.stream).catch(e => console.error(e));

});
</script>

</body>
</html>
