<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FanCode Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:#fff;
}

.header {
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
  background:#020617;
}

/* Tabs */
.tabs {
  display:flex;
  justify-content:space-around;
  background:#111827;
}

.tab {
  padding:12px;
  cursor:pointer;
  flex:1;
  text-align:center;
  color:#9ca3af;
}

.tab.active {
  color:#fff;
  border-bottom:2px solid red;
}

/* Matches */
.container {
  padding:10px;
}

.match {
  background:linear-gradient(145deg,#111827,#1f2937);
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
  cursor:pointer;
}

.teams {
  display:flex;
  justify-content:space-between;
}

.name {
  font-weight:bold;
  font-size:14px;
}

.status {
  margin-top:8px;
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.live { color:red; }
.upcoming { color:#22c55e; }
</style>
</head>

<body>

<div class="header">🔥 FanCode</div>

<div class="tabs">
  <div class="tab active" onclick="loadMatches('live', this)">LIVE</div>
  <div class="tab" onclick="loadMatches('upcoming', this)">UPCOMING</div>
</div>

<div class="container" id="matches"></div>

<script>
const jsonURL = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";
let allMatches = [];

fetch(jsonURL)
.then(res => res.json())
.then(data => {
  allMatches = data.matches;
  loadMatches('live', document.querySelector('.tab'));
});

function loadMatches(type, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  const container = document.getElementById("matches");
  container.innerHTML = "";

  allMatches.forEach((match, index) => {

    const isLive = match.status.toLowerCase().includes("live");

    if (type === 'live' && !isLive) return;
    if (type === 'upcoming' && isLive) return;

    const div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
      <div class="teams">
        <div class="name">${match.team1}</div>
        <div>VS</div>
        <div class="name">${match.team2}</div>
      </div>

      <div class="status">
        <div class="${isLive ? 'live' : 'upcoming'}">
          ${isLive ? '🔴 LIVE' : '🟢 UPCOMING'}
        </div>
        <div>${match.time}</div>
      </div>
    `;

    div.onclick = () => {
      window.location.href = "player.html?id=" + index;
    };

    container.appendChild(div);
  });
}
</script>

</body>
</html>
