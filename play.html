<script>
const params = new URLSearchParams(window.location.search);
const streamId = params.get('id') || '1_ENGLISH';
const quality  = params.get('q') || 'auto';

const JSON_URL = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

const knownQuals = [
  {"width":426,"height":240},{"width":640,"height":360},
  {"width":854,"height":480},{"width":960,"height":540},
  {"width":1280,"height":720},{"width":1920,"height":1080}
];

const video = document.getElementById('video');
let player, selectedHeight = null;

// ── TG popup (unchanged)
(function(){
  const overlay  = document.getElementById('tg-overlay');
  const closeBtn = document.getElementById('tg-close');
  const laterBtn = document.getElementById('tg-later');
  const dismiss  = () => { overlay.classList.add('hidden'); sessionStorage.setItem('tg','1'); };
  if (sessionStorage.getItem('tg')) overlay.classList.add('hidden');
  closeBtn.addEventListener('click', dismiss);
  laterBtn.addEventListener('click', dismiss);
  overlay.addEventListener('click', e => { if(e.target===overlay) dismiss(); });
})();

// ── Fetch JSON + extract auto_streams
async function getStreamFromJSON() {
  const res = await fetch(JSON_URL);
  const data = await res.json();

  const match = data.find(item => item.id == streamId);
  if (!match) throw new Error("Stream ID not found");

  const streams = match.auto_streams;
  if (!streams) throw new Error("No auto_streams found");

  // if quality = auto → pick highest
  if (quality === 'auto') {
    const best = Object.keys(streams).sort((a,b)=>b-a)[0];
    return streams[best];
  }

  // exact quality
  if (streams[quality]) return streams[quality];

  // fallback → nearest
  const closest = Object.keys(streams)
    .map(q => parseInt(q))
    .sort((a,b)=>Math.abs(a-quality) - Math.abs(b-quality))[0];

  return streams[closest];
}

// ── Quality UI (unchanged)
class QualityButton extends shaka.ui.Element {
  constructor(parent, controls) {
    super(parent, controls);
    this.btn = document.createElement('button');
    this.btn.className = 'custom-quality-btn';
    this.btn.innerHTML = '&#9881; <span id="ql">Auto</span>';
    this.menu = document.createElement('div');
    this.menu.className = 'custom-quality-menu';
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;display:flex;align-items:center;';
    wrap.appendChild(this.menu);
    wrap.appendChild(this.btn);
    parent.appendChild(wrap);
    this.btn.addEventListener('click', e => { e.stopPropagation(); this.menu.classList.toggle('open'); });
    document.addEventListener('click', () => this.menu.classList.remove('open'));
  }
}
QualityButton.Factory = class {
  create(rootElement, controls) { return new QualityButton(rootElement, controls); }
};
shaka.ui.Controls.registerElement('custom_quality', new QualityButton.Factory());

function buildQualityMenu(menuEl, streams) {
  menuEl.innerHTML = '';

  Object.keys(streams).sort((a,b)=>b-a).forEach(q => {
    const d = document.createElement('div');
    d.textContent = q + 'p';
    d.addEventListener('click', async () => {
      document.getElementById('ql').textContent = q + 'p';
      const url = streams[q];
      await player.load(url);
      menuEl.classList.remove('open');
    });
    menuEl.appendChild(d);
  });
}

// ── Player init
async function initializePlayer() {
  try {
    const streamData = await fetch(JSON_URL).then(r=>r.json());
    const match = streamData.find(i => i.id == streamId);
    const streams = match.auto_streams;

    const streamUrl = await getStreamFromJSON();

    player = new shaka.Player();
    await player.attach(video);

    const container = document.querySelector('.shaka-video-container');
    const ui = new shaka.ui.Overlay(player, container, video);

    ui.configure({
      controlPanelElements:[
        'play_pause','mute','time_and_duration',
        'spacer','custom_quality','fullscreen'
      ]
    });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
      request.headers['Referer'] = 'https://fancode.com/';
    });

    await player.load(streamUrl);

    // build quality menu from JSON streams
    buildQualityMenu(document.querySelector('.custom-quality-menu'), streams);

    video.play();

  } catch(err) {
    console.error("ERROR:", err);
  }
}

document.addEventListener('DOMContentLoaded', initializePlayer);
</script>
