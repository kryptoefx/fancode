<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SHAKA PLAYER</title>

<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

<style>
/* KEEPING YOUR FULL ORIGINAL CSS UNCHANGED */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial}
.video-container{position:absolute;width:100%;height:100%}
.shaka-video-container{position:absolute;width:100%;height:100%}
video{width:100%;height:100%}
</style>

</head>

<body>

<div class="video-container">

<a href="https://wpjoinlink123.blogspot.com/" target="_blank" class="b4x-join-btn">JOIN US</a>

<div class="shaka-video-container" data-shaka-player>
  <video id="video" autoplay muted playsinline preload="auto"></video>
</div>

</div>

<script>

// ✅ NEW JSON SYSTEM
const queryParams = new URLSearchParams(window.location.search);
const id = queryParams.get('id');
const quality = queryParams.get('q') || "1080";

const JSON_URL = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

let player;
const video = document.getElementById('video');

async function loadStreamFromJSON() {
  try {
    const res = await fetch(JSON_URL);
    const data = await res.json();

    const channel = data.find(item => item.id === id);

    if (!channel) throw new Error("Channel not found");

    const streams = channel.auto_streams;

    if (!streams || !streams.length) {
      throw new Error("No streams available");
    }

    let selected = streams.find(s => s.quality == quality);

    if (!selected) selected = streams[0];

    console.log("Selected Stream:", selected.url);

    return selected.url;

  } catch (err) {
    console.error("JSON Error:", err);
    return "";
  }
}

async function initializePlayer() {
  try {

    player = new shaka.Player(video);

    const container = document.querySelector('.shaka-video-container');
    const ui = new shaka.ui.Overlay(player, container, video);

    ui.configure({
      addBigPlayButton: true,
      controlPanelElements: [
        'play_pause',
        'mute',
        'volume',
        'time_and_duration',
        'spacer',
        'quality',
        'fullscreen'
      ]
    });

    player.configure({
      abr: { enabled: true },
      streaming: {
        bufferingGoal: 10,
        rebufferingGoal: 2
      }
    });

    // ✅ LOAD FROM JSON
    const finalUrl = await loadStreamFromJSON();

    if (!finalUrl) {
      throw new Error("No stream URL found");
    }

    await player.load(finalUrl);

    console.log("Stream loaded");

    try {
      await video.play();
    } catch {
      video.muted = true;
      await video.play();
    }

  } catch (error) {

    console.error("Shaka Error:", error);

    // fallback
    const fallbackUrl = await loadStreamFromJSON();
    if (fallbackUrl) {
      video.src = fallbackUrl;
      video.play();
    }
  }
}

document.addEventListener('DOMContentLoaded', initializePlayer);

</script>

</body>
</html>
