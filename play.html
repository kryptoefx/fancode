<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Fancode Player</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

<style>
body{
  margin:0;
  background:#000;
}
.video-container{
  position:absolute;
  width:100%;
  height:100%;
}
video{
  width:100%;
  height:100%;
}
</style>

</head>

<body>

<div class="video-container">
  <div class="shaka-video-container" data-shaka-player>
    <video id="video" autoplay playsinline></video>
  </div>
</div>

<script>

// 🔥 YOUR JSON SOURCE
const DATA_URL = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

// GET PARAMS
const params = new URLSearchParams(window.location.search);
const matchId = params.get("id");   // 141448_ENGLISH
const quality = params.get("q");    // 720

const video = document.getElementById("video");
let player;

// ✅ FETCH STREAM FROM JSON (ONLY auto_streams)
async function getStreamUrl() {

  const res = await fetch(DATA_URL);
  const data = await res.json();

  const pureId = matchId.split("_")[0];

  const match = data.matches.find(
    m => String(m.match_id) === String(pureId)
  );

  if (!match || !match.auto_streams?.length) {
    throw new Error("Stream not found");
  }

  const masterUrl = match.auto_streams[0].auto;

  console.log("Master URL:", masterUrl);

  // Fetch master playlist
  const playlistRes = await fetch(masterUrl);
  const playlistText = await playlistRes.text();

  // Extract selected quality
  const regex = new RegExp(`(https?:\/\/.*${quality}p\.m3u8)`);
  const found = playlistText.match(regex);

  if (found && found[1]) {
    console.log("Selected Quality:", found[1]);
    return found[1];
  }

  // fallback
  return masterUrl;
}

// ✅ INIT PLAYER
async function initPlayer() {
  try {

    const streamUrl = await getStreamUrl();

    player = new shaka.Player(video);

    const container = document.querySelector(".shaka-video-container");
    const ui = new shaka.ui.Overlay(player, container, video);

    ui.configure({
      addBigPlayButton: true,
      controlPanelElements: [
        "play_pause",
        "mute",
        "volume",
        "time_and_duration",
        "spacer",
        "quality",
        "fullscreen",
        "overflow_menu"
      ]
    });

    await player.load(streamUrl);

    // Force selected quality
    const tracks = player.getVariantTracks();
    const selected = tracks.find(t => t.height == quality);
    if (selected) {
      player.selectVariantTrack(selected, true);
    }

    try {
      await video.play();
    } catch {
      video.muted = true;
      await video.play();
    }

  } catch (err) {
    console.error("Error:", err);
    alert("Stream failed to load");
  }
}

// START
document.addEventListener("DOMContentLoaded", initPlayer);

</script>

</body>
</html>
