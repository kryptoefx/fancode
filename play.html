<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.min.js"></script>

<style>
body { margin:0; background:#000; }
video { width:100%; height:100vh; background:#000; }
</style>
</head>

<body>

<video id="video" controls autoplay></video>

<script>
const DATA_URL = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

// URL params
const params = new URLSearchParams(location.search);
const matchParam = params.get("id") || "";
const quality = params.get("q") || "auto";

// extract match id
const matchId = matchParam.split("_")[0];

async function init() {
  const video = document.getElementById("video");

  // Create UI
  const ui = video['ui'];
  const controls = ui.getControls();
  const player = controls.getPlayer();

  try {
    const res = await fetch(DATA_URL);
    const json = await res.json();

    const match = (json.matches || []).find(m => 
      String(m.match_id) === String(matchId)
    );

    if (!match) throw "Match not found";

    let master = match.auto_streams?.[0]?.auto;
    if (!master) throw "Stream missing";

    let finalUrl = master;

    // 🔥 IMPORTANT FIX: extract variant streams properly
    if (quality !== "auto") {
      const lines = master.split("\n");

      for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes(quality + "p")) {
          finalUrl = lines[i + 1]; // next line is URL
          break;
        }
      }
    }

    // fallback if not found
    if (!finalUrl.startsWith("http")) {
      finalUrl = master;
    }

    await player.load(finalUrl);
    console.log("Playing:", finalUrl);

  } catch (err) {
    console.error(err);
    alert("Stream failed");
  }
}

document.addEventListener("shaka-ui-loaded", init);
</script>

</body>
</html>
