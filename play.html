<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.min.js"></script>

<style>
body {
  margin: 0;
  background: #000;
}

video {
  width: 100%;
  height: 100vh;
  background: #000;
}
</style>
</head>

<body>

<video id="video" autoplay controls></video>

<script>
const DATA_URL = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

// Get params
const params = new URLSearchParams(location.search);
const matchIdParam = params.get("id") || "";
const quality = params.get("q") || "auto";

// Extract match_id
const matchId = matchIdParam.split("_")[0];

// Init Player
async function initPlayer() {
  const video = document.getElementById("video");
  const ui = video['ui'];
  const controls = ui.getControls();
  const player = controls.getPlayer();

  // Load JSON
  const res = await fetch(DATA_URL);
  const data = await res.json();

  const matches = data.matches || [];

  // Find match
  const match = matches.find(m => String(m.match_id) === String(matchId));

  if (!match || !match.auto_streams || !match.auto_streams.length) {
    alert("Stream not found");
    return;
  }

  let master = match.auto_streams[0].auto;

  let streamUrl = master;

  // If specific quality requested
  if (quality !== "auto") {
    const regex = new RegExp(`(https?:\/\/.*${quality}p\\.m3u8)`);
    const found = master.match(regex);
    if (found) {
      streamUrl = found[1];
    }
  }

  // Load stream
  try {
    await player.load(streamUrl);
    console.log("Loaded:", streamUrl);
  } catch (e) {
    console.error("Error loading stream", e);
    alert("Failed to load stream");
  }
}

// Shaka ready
document.addEventListener('shaka-ui-loaded', initPlayer);
</script>

</body>
</html>
