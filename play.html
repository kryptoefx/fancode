<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Fancode Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

<style>
body{margin:0;background:#000;}
.video-container{position:absolute;width:100%;height:100%;}
video{width:100%;height:100%;}
</style>

</head>

<body>

<div class="video-container">
  <div class="shaka-video-container" data-shaka-player>
    <video id="video" autoplay playsinline></video>
  </div>
</div>

<script>

const DATA_URL = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

const params = new URLSearchParams(window.location.search);
const matchId = params.get("id");
const quality = params.get("q");

const video = document.getElementById("video");
let player;


// 🔥 GET STREAM FROM auto_streams
async function getStreamUrl(){

  const res = await fetch(DATA_URL);
  const data = await res.json();

  const pureId = matchId.split("_")[0];

  const match = data.matches.find(m => String(m.match_id) === String(pureId));

  if(!match || !match.auto_streams?.length){
    throw new Error("Stream not found");
  }

  const playlistText = match.auto_streams[0].auto;

  // Extract quality URL
  const regex = new RegExp(`https?:\/\/.*${quality}p\.m3u8[^\n]*`);
  const found = playlistText.match(regex);

  if(found) return found[0];

  return playlistText.match(/https?:\/\/.*\.m3u8[^\n]*/)[0];
}


// 🔥 INIT PLAYER WITH HEADERS FIX
async function initPlayer(){

  try{

    const streamUrl = await getStreamUrl();

    console.log("Playing:", streamUrl);

    player = new shaka.Player(video);

    // ✅ IMPORTANT FIX: ADD HEADERS
    player.getNetworkingEngine().registerRequestFilter(function(type, request) {
      request.headers['Referer'] = 'https://www.fancode.com/';
      request.headers['Origin'] = 'https://www.fancode.com';
    });

    const container = document.querySelector(".shaka-video-container");
    const ui = new shaka.ui.Overlay(player, container, video);

    ui.configure({
      addBigPlayButton:true,
      controlPanelElements:[
        "play_pause",
        "mute",
        "volume",
        "time_and_duration",
        "spacer",
        "quality",
        "fullscreen"
      ]
    });

    await player.load(streamUrl);

    try{
      await video.play();
    }catch{
      video.muted = true;
      await video.play();
    }

  }catch(err){
    console.error("ERROR:", err);
    alert("Stream blocked / expired");
  }
}

document.addEventListener("DOMContentLoaded", initPlayer);

</script>

</body>
</html>
