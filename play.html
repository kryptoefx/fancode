*{margin:0;padding:0;box-sizing:border-box}

:root{
  --red:#e10600;
  --dark:#0c0f14;
  --light:#ffffff;
}

#loader{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  background:var(--dark);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:99999;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  transition:opacity .6s ease, visibility .6s ease;
}

/* Moving red background streak */
#loader::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:repeating-linear-gradient(
    120deg,
    rgba(225,6,0,.15) 0px,
    rgba(225,6,0,.15) 8px,
    transparent 8px,
    transparent 50px
  );
  animation:moveBg 6s linear infinite;
}

@keyframes moveBg{
  from{transform:translate(-15%,-15%)}
  to{transform:translate(0%,0%)}
}

.intro-box{
  position:relative;
  width:100%;
  max-width:550px;
  background:linear-gradient(90deg,#111,#181c22);
  border-left:6px solid var(--red);
  box-shadow:0 0 40px rgba(225,6,0,.3);
  padding:35px 25px;
  animation:slideIn 0.8s ease forwards;
  transform:translateY(30px);
  opacity:0;
  text-align:left;
}

@keyframes slideIn{
  to{
    transform:translateY(0);
    opacity:1;
  }
}

.channel{
  color:var(--red);
  font-weight:900;
  font-size:clamp(14px,4vw,18px);
  letter-spacing:3px;
  margin-bottom:12px;
}

.headline{
  color:var(--light);
  font-size:clamp(22px,7vw,38px);
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  position:relative;
  line-height:1.2;
}

.headline::after{
  content:"";
  position:absolute;
  bottom:-8px;
  left:0;
  height:3px;
  width:0%;
  background:var(--red);
  animation:lineGrow 1s ease forwards .8s;
}

@keyframes lineGrow{
  to{width:100%}
}

.subheadline{
  margin-top:18px;
  font-size:clamp(11px,3vw,14px);
  letter-spacing:1px;
  color:#bbb;
  word-break:break-word;
}

.flash{
  position:absolute;
  inset:0;
  background:white;
  opacity:0;
  animation:flashAnim 1s ease 1.2s;
}

@keyframes flashAnim{
  0%{opacity:0}
  40%{opacity:.25}
  100%{opacity:0}
}

#loader.off{
  opacity:0;
  visibility:hidden;
}

<script>

const DATA_URL = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

const params = new URLSearchParams(window.location.search);
const matchId = params.get("id");
const quality = params.get("q");

const video = document.getElementById("video");
let player;


// 🔥 GET STREAM FROM auto_streams
async function getStreamUrl(){

  const res = await fetch(DATA_URL);
  const data = await res.json();

  const pureId = matchId.split("_")[0];

  const match = data.matches.find(m => String(m.match_id) === String(pureId));

  if(!match || !match.auto_streams?.length){
    throw new Error("Stream not found");
  }

  const playlistText = match.auto_streams[0].auto;

  // Extract quality URL
  const regex = new RegExp(`https?:\/\/.*${quality}p\.m3u8[^\n]*`);
  const found = playlistText.match(regex);

  if(found) return found[0];

  return playlistText.match(/https?:\/\/.*\.m3u8[^\n]*/)[0];
}


// 🔥 INIT PLAYER WITH HEADERS FIX
async function initPlayer(){

  try{

    const streamUrl = await getStreamUrl();

    console.log("Playing:", streamUrl);

    player = new shaka.Player(video);

    // ✅ IMPORTANT FIX: ADD HEADERS
    player.getNetworkingEngine().registerRequestFilter(function(type, request) {
      request.headers['Referer'] = 'https://www.fancode.com/';
      request.headers['Origin'] = 'https://www.fancode.com';
    });

    const container = document.querySelector(".shaka-video-container");
    const ui = new shaka.ui.Overlay(player, container, video);

    ui.configure({
      addBigPlayButton:true,
      controlPanelElements:[
        "play_pause",
        "mute",
        "volume",
        "time_and_duration",
        "spacer",
        "quality",
        "fullscreen"
      ]
    });

    await player.load(streamUrl);

    try{
      await video.play();
    }catch{
      video.muted = true;
      await video.play();
    }

  }catch(err){
    console.error("ERROR:", err);
    alert("Stream blocked / expired");
  }
}

document.addEventListener("DOMContentLoaded", initPlayer);

</script>
