<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Fancode Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

<style>
body{
  margin:0;
  background:#000;
}
.video-container{
  position:absolute;
  width:100%;
  height:100%;
}
video{
  width:100%;
  height:100%;
}
</style>

</head>

<body>

<div class="video-container">
  <div class="shaka-video-container" data-shaka-player>
    <video id="video" autoplay playsinline></video>
  </div>
</div>

<script>

// JSON FILE
const DATA_URL = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

// GET PARAMS FROM INDEX
const params = new URLSearchParams(window.location.search);
const matchId = params.get("id");   // example: 141338_ENGLISH
const quality = params.get("q");    // example: 720

const video = document.getElementById("video");
let player;


// STEP 1: GET STREAM FROM JSON (auto_streams only)
async function getStreamUrl(){

  const res = await fetch(DATA_URL);
  const data = await res.json();

  const pureId = matchId.split("_")[0];

  const match = data.matches.find(m => String(m.match_id) === String(pureId));

  if(!match || !match.auto_streams || !match.auto_streams.length){
    throw new Error("Stream not found");
  }

  const playlistText = match.auto_streams[0].auto;

  console.log("AUTO STREAM TEXT:", playlistText);

  // STEP 2: EXTRACT SELECTED QUALITY
  const regex = new RegExp(`https?:\/\/.*${quality}p\.m3u8[^\\n]*`);
  const found = playlistText.match(regex);

  if(found && found[0]){
    console.log("Selected quality stream:", found[0]);
    return found[0];
  }

  // fallback → pick 720 if not found
  const fallback = playlistText.match(/https?:\/\/.*720p\.m3u8[^\n]*/);
  if(fallback) return fallback[0];

  // final fallback → first available stream
  const first = playlistText.match(/https?:\/\/.*\.m3u8[^\n]*/);
  return first ? first[0] : null;
}


// STEP 3: START SHAKA PLAYER
async function initPlayer(){

  try{

    const streamUrl = await getStreamUrl();

    console.log("PLAYING:", streamUrl);

    player = new shaka.Player(video);

    const container = document.querySelector(".shaka-video-container");
    const ui = new shaka.ui.Overlay(player, container, video);

    ui.configure({
      addBigPlayButton:true,
      controlPanelElements:[
        "play_pause",
        "mute",
        "volume",
        "time_and_duration",
        "spacer",
        "quality",
        "fullscreen",
        "overflow_menu"
      ]
    });

    await player.load(streamUrl);

    try{
      await video.play();
    }catch{
      video.muted = true;
      await video.play();
    }

  }catch(err){
    console.error(err);
    alert("Stream failed to load");
  }
}

document.addEventListener("DOMContentLoaded", initPlayer);

</script>

</body>
</html>
